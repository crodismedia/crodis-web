<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRODIS Web</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
}

header{
    background:#0d47a1;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    background:#1565c0;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-weight:bold;
}

.hero{
    padding:60px 20px;
    text-align:center;
}

.hero h1{
    font-size:42px;
    color:#0d47a1;
}

.hero p{
    font-size:20px;
}

input{
    width:300px;
    max-width:90%;
    padding:12px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    padding:12px 25px;
    background:#0d47a1;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-top:15px;
}

footer{
    margin-top:60px;
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
}
</style>

</head>

<body>

<header>
<h2>CRODIS WEB</h2>
<p>Directorio Profesional de Talleres de Vending, Café y Hostelería</p>
</header>

<nav>
<a href="#">Inicio</a>
<a href="#">Talleres</a>
<a href="#">Servicios</a>
<a href="#">Contacto</a>
</nav>

<section class="hero">

<h1>Encuentra el taller que necesitas</h1>

<p>Busca talleres de reparación y servicio técnico en toda España.</p>

<input type="text" placeholder="Buscar ciudad, provincia o empresa">

<br>

<button>Buscar Taller</button>

</section>

<footer>

© 2026 CRODIS WEB

</footer>

</html>

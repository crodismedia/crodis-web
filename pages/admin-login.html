<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Acceso de administración | TallerMap</title>
    <link rel="stylesheet" href="../css/estilo.css">
</head>
<body class="pagina-registro">
    <header class="cabecera"><div class="contenedor cabecera-contenido">
        <a href="../index.html" class="marca"><span class="marca-icono">TM</span><span class="marca-texto"><strong>TallerMap</strong><small>Administración</small></span></a>
        <a href="../index.html" class="boton-enlace">Volver al inicio</a>
    </div></header>
    <main class="admin-acceso"><form id="formulario-admin-login" class="formulario-registro admin-login" novalidate>
        <div class="formulario-cabecera"><span>Acceso de administración</span><p>Inicia sesión con una cuenta administradora autorizada.</p></div>
        <div id="mensaje-login" class="mensaje-formulario" role="status" aria-live="polite" hidden></div>
        <div class="campo-formulario"><label for="email-admin">Email</label><input id="email-admin" type="email" autocomplete="email" required></div>
        <div class="campo-formulario"><label for="password-admin">Contraseña</label><input id="password-admin" type="password" autocomplete="current-password" required></div>
        <button id="boton-login" class="boton boton-enviar" type="submit">Iniciar sesión</button>
    </form></main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/admin-login.js"></script>
</body>
</html>

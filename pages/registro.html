<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Registrar taller | TallerMap</title>

    <meta
        name="description"
        content="Registra tu taller mecánico en TallerMap."
    >

    <link rel="stylesheet" href="../css/estilo.css">
</head>

<body>

<header class="cabecera">
    <div class="contenedor cabecera-contenido">

        <a href="../index.html" class="marca">
            <span class="marca-icono">TM</span>

            <span class="marca-texto">
                <strong>TallerMap</strong>
                <small>Talleres cerca de ti</small>
            </span>
        </a>

        <nav>
            <a href="../index.html">Inicio</a>
        </nav>

    </div>
</header>

<main class="contenedor">

    <section class="seccion-registro">

        <h1>Registrar un taller</h1>

        <p>
            Completa los datos del taller. La solicitud será revisada antes
            de publicarse en TallerMap.
        </p>

        <form id="formulario-registro">

            <div class="campo-formulario">
                <label for="nombre_taller">
                    Nombre del taller
                </label>

                <input
                    type="text"
                    id="nombre_taller"
                    name="nombre_taller"
                    autocomplete="organization"
                    required
                >
            </div>

            <div class="campo-formulario">
                <label for="propietario">
                    Propietario o responsable
                </label>

                <input
                    type="text"
                    id="propietario"
                    name="propietario"
                    autocomplete="name"
                    required
                >
            </div>

            <div class="campo-formulario">
                <label for="cif">
                    CIF o NIF
                </label>

                <input
                    type="text"
                    id="cif"
                    name="cif"
                    autocomplete="off"
                >
            </div>

            <div class="campo-formulario">
                <label for="email">
                    Correo electrónico
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    autocomplete="email"
                    placeholder="ejemplo@correo.com"
                    required
                >
            </div>

            <div class="campo-formulario">
                <label for="telefono">
                    Teléfono
                </label>

                <input
                    type="tel"
                    id="telefono"
                    name="telefono"
                    autocomplete="tel"
                    required
                >
            </div>

            <div class="campo-formulario">
                <label for="direccion">
                    Dirección
                </label>

                <input
                    type="text"
                    id="direccion"
                    name="direccion"
                    autocomplete="street-address"
                    required
                >
            </div>

            <div class="campo-formulario">
                <label for="codigo_postal">
                    Código postal
                </label>

                <input
                    type="text"
                    id="codigo_postal"
                    name="codigo_postal"
                    inputmode="numeric"
                    autocomplete="postal-code"
                    maxlength="5"
                    required
                >
            </div>

            <div class="campo-formulario">
                <label for="ciudad">
                    Ciudad
                </label>

                <input
                    type="text"
                    id="ciudad"
                    name="ciudad"
                    autocomplete="address-level2"
                    required
                >
            </div>

            <div class="campo-formulario">
                <label for="provincia">
                    Provincia
                </label>

                <input
                    type="text"
                    id="provincia"
                    name="provincia"
                    value="Valencia"
                    autocomplete="address-level1"
                    required
                >
            </div>

            <div class="campo-formulario">
                <label for="descripcion">
                    Descripción del taller
                </label>

                <textarea
                    id="descripcion"
                    name="descripcion"
                    rows="6"
                    placeholder="Describe los servicios que ofrece el taller"
                ></textarea>
            </div>

            <div class="campo-formulario">
                <label>
                    <input
                        type="checkbox"
                        id="aceptar_condiciones"
                        name="aceptar_condiciones"
                        required
                    >

                    Confirmo que los datos introducidos son correctos.
                </label>
            </div>

            <button
                type="submit"
                id="boton-enviar"
            >
                Enviar solicitud
            </button>

            <p
                id="mensaje-formulario"
                role="status"
                aria-live="polite"
            ></p>

        </form>

    </section>

</main>

<footer class="pie-pagina">
    <div class="contenedor">
        <p>
            © TallerMap
        </p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/registro.js"></script>

</body>
</html>

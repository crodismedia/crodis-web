<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Registrar taller | TallerMap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
      font-size: 26px;
      color: #333;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: #444;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .checkbox {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      background: #0077ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #005fcc;
    }

    .success {
      margin-top: 20px;
      padding: 12px;
      background: #d4f7d4;
      border: 1px solid #8cd98c;
      color: #2d7a2d;
      border-radius: 6px;
      display: none;
    }

    .error {
      border-color: red !important;
    }

    .error-msg {
      color: red;
      font-size: 13px;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Registrar taller</h1>
  <p>Completa los datos del taller. La solicitud será revisada antes de publicarse en TallerMap.</p>

  <form id="formTaller" novalidate>

    <label>Nombre del taller</label>
    <input type="text" id="nombre" required />
    <div class="error-msg" data-error="nombre"></div>

    <label>Propietario o responsable</label>
    <input type="text" id="responsable" required />
    <div class="error-msg" data-error="responsable"></div>

    <label>CIF o NIF</label>
    <input type="text" id="cif" required />
    <div class="error-msg" data-error="cif"></div>

    <label>Correo electrónico</label>
    <input type="email" id="email" required />
    <div class="error-msg" data-error="email"></div>

    <label>Teléfono</label>
    <input type="tel" id="telefono" required />
    <div class="error-msg" data-error="telefono"></div>

    <label>Dirección</label>
    <input type="text" id="direccion" required />
    <div class="error-msg" data-error="direccion"></div>

    <label>Código postal</label>
    <input type="text" id="cp" required />
    <div class="error-msg" data-error="cp"></div>

    <label>Ciudad</label>
    <input type="text" id="ciudad" required />
    <div class="error-msg" data-error="ciudad"></div>

    <label>Provincia</label>
    <input type="text" id="provincia" required />
    <div class="error-msg" data-error="provincia"></div>

    <label>Descripción del taller</label>
    <textarea id="descripcion" required>
